  <title>Hồ sơ thành viên MSC</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #f0f4ff, #d6e4ff);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    h1 {
      text-align: center;
      color: #1d4ed8;
      font-size: 2rem;
      margin-bottom: 3rem;
      letter-spacing: 1px;
    }

    .pyramid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      width: 100%;
      max-width: 1200px;
    }

    .pyramid-level {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      position: relative;
    }

    .pyramid-level::after {
      content: '';
      position: absolute;
      top: -2rem;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, #60a5fa, #a78bfa, #f472b6);
      opacity: 0.6;
    }

    .pyramid-level:first-child::after {
      display: none;
    }

    .member {
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: white;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.06);
      max-width: 130px;
    }

    .member:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    .member img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #1d4ed8;
      margin-bottom: 0.5rem;
    }

    .member p {
      margin: 0;
      font-weight: bold;
      font-size: 0.95rem;
      color: #1e293b;
    }

    @media (max-width: 768px) {
      .pyramid-level {
        flex-direction: column;
        gap: 1.5rem;
      }
    }
  </style>
</head>
